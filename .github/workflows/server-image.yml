name: Build server image

# Builds and pushes the server image to GHCR on every push to main that touches
# the server. Watchtower on the host then pulls the new :latest and recreates
# the container. The git SHA is baked in via JACKED_COMMIT so the running server
# knows exactly which commit it is on.

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/server-image.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          build-args: |
            JACKED_COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/aquatictw/jackedlog-server:latest
            ghcr.io/aquatictw/jackedlog-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
